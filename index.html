<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Search & Local Notes</title>
  </head>
  <body>
    <script>
      // Public SearXNG instances pool
      // Prioritizing verified CORS-enabled instances
      const SEARX_INSTANCES = [
        "https://search.rhscz.eu",
        "https://searx.rhscz.eu",
        "https://opnxng.com",
        "https://searx.be",
        "https://searx.mxchange.org",
        "https://searx.work",
        "https://paulgo.io",
        "https://searxng.site"
      ];

      // Helper function to translate text using the free Google Translate endpoint
      async function translateText(text, fromLang, toLang) {
        if (!text || text.trim() === '') return '';
        try {
          const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${fromLang}&tl=${toLang}&dt=t&q=${encodeURIComponent(text)}`;
          const response = await fetch(url);
          if (!response.ok) return text;
          const json = await response.json();
          if (json && json[0]) {
            let result = '';
            json[0].forEach(item => {
              if (item[0]) result += item[0];
            });
            return result;
          }
        } catch (e) {
          console.error("Translation error:", e);
        }
        return text;
      }

      // Safe query cleaning function - removes conversational prefixes and suffixes
      // without damaging middle words (e.g. keeps "อาหาร" instead of mangling it to "อร")
      function cleanQuery(query) {
        if (!query) return '';
        let cleaned = query.trim();
        
        // Remove question marks and common punctuation
        cleaned = cleaned.replace(/[?？!！.,，_]/g, '');
        
        // Remove common Thai polite particles and question words at the end
        cleaned = cleaned.replace(/(ครับ|ค่ะ|คะ|นะคราบ|นะค้าบ|นะ|หน่อย|บ้าง|ไหม|หรือไม่|ครับผม|แน่|จริง|หรือเปล่า|หรือยัง)$/g, '');
        
        // Remove search prefix verbs
        cleaned = cleaned.replace(/^(ช่วยค้นหา|ช่วยหา|ค้นหา|หาข้อมูล|หา|อยากรู้ว่า|บอกหน่อยว่า|สืบค้น|ขอข้อมูล)\s*/g, '');
        
        return cleaned.replace(/\s+/g, ' ').trim();
      }

      // Format query to inject site operator if social media platform is mentioned
      function formatQueryWithSiteOperators(query) {
        let q = query.toLowerCase();
        let siteOp = '';
        
        if (q.includes('facebook') || q.includes('เฟสบุ๊ค') || q.includes('เฟสบุค')) {
          siteOp = ' site:facebook.com';
          q = q.replace(/facebook|เฟสบุ๊ค|เฟสบุค/g, '');
        } else if (q.includes('tiktok') || q.includes('ติ๊กต๊อก') || q.includes('ติกตอก')) {
          siteOp = ' site:tiktok.com';
          q = q.replace(/tiktok|ติ๊กต๊อก|ติกตอก/g, '');
        } else if (q.includes('instagram') || q.includes('อินสตาแกรม') || q.includes('ไอจี') || q.includes('ig')) {
          siteOp = ' site:instagram.com';
          q = q.replace(/instagram|อินสตาแกรม|ไอจี|ig/g, '');
        } else if (q.includes('twitter') || q.includes('ทวิตเตอร์') || q.includes(' x ') || q.startsWith('x ') || q.endsWith(' x')) {
          siteOp = ' site:x.com';
          q = q.replace(/twitter|ทวิตเตอร์|x/g, '');
        }
        
        const cleanedQuery = cleanQuery(q) || q;
        return cleanedQuery + siteOp;
      }

      // Fallback search to Wikipedia if all SearXNG instances fail
      async function fallbackWikipediaSearch(query) {
        const isThai = /[\u0E00-\u0E7F]/.test(query);
        const cleaned = cleanQuery(query) || query;
        const lang = isThai ? 'th' : 'en';
        
        // Try search terms in order of specificity to ensure we get a response
        const searchTerms = [cleaned];
        const parts = cleaned.split(/\s+/).filter(p => p.length > 0);
        if (parts.length > 1) {
          // Fallback to the last word (likely the main entity or location)
          searchTerms.push(parts[parts.length - 1]);
          // Fallback to first and last word combined
          searchTerms.push(`${parts[0]} ${parts[parts.length - 1]}`);
        }
        
        for (const term of searchTerms) {
          try {
            const searchUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(term)}&utf8=&format=json&origin=*`;
            const searchResponse = await fetch(searchUrl);
            
            if (searchResponse.ok) {
              const searchData = await searchResponse.json();
              if (searchData.query && searchData.query.search && searchData.query.search.length > 0) {
                const title = searchData.query.search[0].title;
                
                // Fetch summary of the Wikipedia result
                const summaryUrl = `https://${lang}.wikipedia.org/w/api.php?action=query&prop=extracts&exintro=&explaintext=&titles=${encodeURIComponent(title)}&format=json&origin=*`;
                const summaryResponse = await fetch(summaryUrl);
                
                if (summaryResponse.ok) {
                  const summaryData = await summaryResponse.json();
                  const pages = summaryData.query.pages;
                  const pageId = Object.keys(pages)[0];
                  const extract = pages[pageId].extract;
                  
                  if (extract) {
                    return `[ผลลัพธ์สำรองจาก Wikipedia: ${title}]\n${extract}`;
                  }
                }
              }
            }
          } catch (wikiError) {
            console.warn(`Wikipedia fallback failed for term "${term}":`, wikiError);
          }
        }
        return 'ไม่พบข้อมูลที่แน่ชัดจากการค้นหาผ่านเครือข่าย กรุณาลองเปลี่ยนคำค้นหาให้กระชับขึ้น';
      }

      /**
       * Performs a search on SearXNG instances with site operators, translation, and fallback.
       * @param {string} query - The search query.
       */
      async function runSearch(query) {
        const isThai = /[\u0E00-\u0E7F]/.test(query);
        const hasSiteOp = query.toLowerCase().includes('facebook') || 
                          query.toLowerCase().includes('เฟสบุ๊ค') ||
                          query.toLowerCase().includes('เฟสบุค') ||
                          query.toLowerCase().includes('tiktok') ||
                          query.toLowerCase().includes('ติ๊กต๊อก') ||
                          query.toLowerCase().includes('ติกตอก') ||
                          query.toLowerCase().includes('instagram') ||
                          query.toLowerCase().includes('อินสตาแกรม') ||
                          query.toLowerCase().includes('ไอจี') ||
                          query.toLowerCase().includes('ig') ||
                          query.toLowerCase().includes('twitter') ||
                          query.toLowerCase().includes('ทวิตเตอร์') ||
                          query.toLowerCase().includes(' x ') ||
                          query.toLowerCase().startsWith('x ') ||
                          query.toLowerCase().endsWith(' x');

        let searchQuery = formatQueryWithSiteOperators(query);
        let shouldTranslateBack = false;

        // Only translate to English if it is a general web search in Thai (no social media site scoping)
        if (isThai && !hasSiteOp) {
          const cleaned = cleanQuery(query) || query;
          const englishQuery = await translateText(cleaned, 'th', 'en');
          if (englishQuery && englishQuery.trim() !== '') {
            searchQuery = englishQuery;
            shouldTranslateBack = true;
          }
        }

        const encodedQuery = encodeURIComponent(searchQuery);
        
        // Try each SearXNG instance sequentially
        for (let i = 0; i < SEARX_INSTANCES.length; i++) {
          const baseUrl = SEARX_INSTANCES[i].replace(/\/+$/, '');
          const url = `${baseUrl}/search?q=${encodedQuery}&format=json`;
          
          try {
            const response = await fetch(url);
            if (response.ok) {
              const json = await response.json();
              if (json && json.results && json.results.length > 0) {
                // Slice to top 3 results to prevent LLM repetition loops
                const resultsToUse = json.results.slice(0, 3);
                
                let formattedResult = `[ผลการค้นหาจากเครือข่ายสำหรับ: ${searchQuery}]\n\n`;
                for (let idx = 0; idx < resultsToUse.length; idx++) {
                  const item = resultsToUse[idx];
                  let title = item.title || '';
                  let content = item.content || '';
                  
                  // Translate title and content individually to avoid HTTP 414 long URLs
                  if (shouldTranslateBack && isThai) {
                    title = await translateText(title, 'en', 'th');
                    content = await translateText(content, 'en', 'th');
                  }
                  
                  formattedResult += `${idx + 1}. หัวข้อ: ${title}\n`;
                  if (content) {
                    formattedResult += `   รายละเอียด: ${content}\n`;
                  }
                  formattedResult += '\n';
                }
                return formattedResult;
              }
            }
          } catch (e) {
            console.warn(`SearXNG instance ${baseUrl} failed:`, e);
          }
        }
        
        // Fallback to Wikipedia search if all instances fail
        return await fallbackWikipediaSearch(query);
      }

      // Local Notes Functions using localStorage
      function saveNote(text) {
        try {
          const notes = JSON.parse(localStorage.getItem('gemma_notes') || '[]');
          const newNote = {
            id: Date.now().toString(),
            text: text,
            date: new Date().toLocaleString('th-TH')
          };
          notes.push(newNote);
          localStorage.setItem('gemma_notes', JSON.stringify(notes));
          return `บันทึกโน้ตสำเร็จแล้ว: "${text}"`;
        } catch (e) {
          return `เกิดข้อผิดพลาดในการบันทึกโน้ต: ${e.message}`;
        }
      }

      function readNotes(query) {
        try {
          const notes = JSON.parse(localStorage.getItem('gemma_notes') || '[]');
          if (notes.length === 0) {
            return 'ไม่มีโน้ตที่บันทึกไว้ในขณะนี้';
          }
          
          let filtered = notes;
          if (query) {
            const q = query.toLowerCase();
            filtered = notes.filter(n => n.text.toLowerCase().includes(q));
          }
          
          if (filtered.length === 0) {
            return `ไม่พบโน้ตที่เกี่ยวข้องกับ "${query}"`;
          }
          
          let result = '[โน้ตที่บันทึกไว้ทั้งหมด]\n';
          filtered.forEach((n, idx) => {
            result += `${idx + 1}. [${n.date}] ${n.text}\n`;
          });
          return result;
        } catch (e) {
          return `เกิดข้อผิดพลาดในการอ่านโน้ต: ${e.message}`;
        }
      }

      function deleteNote(query) {
        try {
          const notes = JSON.parse(localStorage.getItem('gemma_notes') || '[]');
          if (notes.length === 0) {
            return 'ไม่มีโน้ตที่จะลบ';
          }
          
          const q = query.toLowerCase();
          const initialLength = notes.length;
          const filtered = notes.filter(n => !n.text.toLowerCase().includes(q));
          
          if (filtered.length === initialLength) {
            return `ไม่พบโน้ตที่ตรงกับ "${query}" เพื่อทำการลบ`;
          }
          
          localStorage.setItem('gemma_notes', JSON.stringify(filtered));
          return `ลบโน้ตที่เกี่ยวข้องกับ "${query}" สำเร็จแล้ว`;
        } catch (e) {
          return `เกิดข้อผิดพลาดในการลบโน้ต: ${e.message}`;
        }
      }

      window["ai_edge_gallery_get_result"] = async (data) => {
        try {
          const jsonData = JSON.parse(data);
          
          // Backwards compatibility for older calls
          if (!jsonData.type && jsonData.query) {
            jsonData.type = 'search';
          }
          
          if (jsonData.type === 'search') {
            const searchResult = await runSearch(jsonData.query);
            return JSON.stringify({ result: searchResult });
          } else if (jsonData.type === 'note_save') {
            const result = saveNote(jsonData.text);
            return JSON.stringify({ result: result });
          } else if (jsonData.type === 'note_read') {
            const result = readNotes(jsonData.query);
            return JSON.stringify({ result: result });
          } else if (jsonData.type === 'note_delete') {
            const result = deleteNote(jsonData.query);
            return JSON.stringify({ result: result });
          } else {
            return JSON.stringify({ error: "ไม่รองรับการทำงานประเภทนี้ (Operation not supported)" });
          }
        } catch (e) {
          console.error(e);
          return JSON.stringify({ error: `Failed to query: ${e.message}` });
        }
      };
    </script>
  </body>
</html>
